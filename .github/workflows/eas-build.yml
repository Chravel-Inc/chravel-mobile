name: EAS Build & Submit to TestFlight

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: TypeScript check
        run: npx tsc --noEmit

  build:
    name: Build iOS & Submit to TestFlight
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: ^12.0.0
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Verify EAS authentication
        run: eas whoami

      - name: Install dependencies
        run: npm ci

      - name: Build and submit to TestFlight
        run: |
          eas build --platform ios --profile production --non-interactive --auto-submit 2>&1 | tee build-output.txt
          echo "### EAS Build" >> $GITHUB_STEP_SUMMARY
          grep -oP 'https://expo.dev/accounts/\S+' build-output.txt >> $GITHUB_STEP_SUMMARY || true
